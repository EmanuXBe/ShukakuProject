<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikaku - Juego</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <h1>Shikaku Puzzle</h1>
    </header>

    <main class="game-container">
        <!-- Panel lateral con controles -->
        <aside class="side-panel">
            <div class="control-group">
                <label for="difficulty-selector">Dificultad:</label>
                <select id="difficulty-selector">
                    <option value="easy">Fácil (5x5)</option>
                    <option value="medium" selected>Medio (7x7)</option>
                    <option value="hard">Difícil (10x10)</option>
                </select>
            </div>
            
            <div class="control-group buttons">
                <button id="btn-restart" class="btn btn-secondary">Reiniciar</button>
                <button id="btn-verify" class="btn btn-primary">Verificar</button>
            </div>

            <div class="instructions">
                <h3>Cómo jugar:</h3>
                <p>Divide la cuadrícula en rectángulos de manera que:</p>
                <ul>
                    <li>Cada rectángulo contenga exactamente un número.</li>
                    <li>El área (casillas) del rectángulo sea igual a ese número.</li>
                    <li>Ningún rectángulo se superponga.</li>
                </ul>
            </div>
        </aside>

        <!-- Contenedor principal para el tablero -->
        <section class="board-container">
            <!-- El tablero se generará dinámicamente vía JS. Aquí se ilustra un demo de 5x5 -->
            <div id="shikaku-board" class="grid-board" style="--grid-size: 5;">
                <!-- Estas celdas son sólo un placeholder visual -->
                <div class="cell"></div>
                <div class="cell clue">2</div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell clue">3</div>
                
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell rect-selected"></div>
                <div class="cell rect-selected clue">2</div>
                <div class="cell"></div>
                <!-- ... el resto se inyecta con el script ... -->
            </div>
        </section>
    </main>

    <script src="js/app.js" defer></script>
</body>
</html>
