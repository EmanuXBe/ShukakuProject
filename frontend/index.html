<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shukaku</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <h1>Shukaku</h1>
  </header>

  <main>
    <section id="controls">
      <button id="btn-new-game">Nueva partida</button>
      <button id="btn-solve">Resolver (IA)</button>
    </section>

    <section id="board-container">
      <!-- The board grid is rendered here by game.js -->
    </section>

    <section id="metrics" hidden>
      <h2>Métricas del solucionador</h2>
      <p>Nodos explorados: <span id="metric-nodes">—</span></p>
      <p>Tiempo: <span id="metric-time">—</span> s</p>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
